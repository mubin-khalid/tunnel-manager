name: Upload release artifacts

# Builds only when a GitHub Release is created — not on every push to main.
# Maintainers: create a Release (and tag vX.Y.Z) that matches package.json; this workflow uploads Linux + macOS bundles to that release.
on:
  release:
    types: [created]

concurrency:
  group: tunnel-manager-release-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Verify package.json matches release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VER="${TAG#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$VER" != "$PKG" ]; then
            echo "::error::Release tag $TAG (expected version $VER) does not match package.json ($PKG)"
            exit 1
          fi

  build-linux:
    name: Build Linux bundles
    needs: verify-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install frontend dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Prefetch Cargo crates with retries
        run: |
          for i in 1 2 3 4 5; do
            cargo fetch --manifest-path src-tauri/Cargo.toml && break
            echo "cargo fetch failed (attempt $i), retrying in 15s..."
            sleep 15
          done

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build and upload Linux artifacts
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ github.event.release.tag_name }}
          retryAttempts: 3

  build-dmg:
    name: Build macOS DMG
    needs: verify-release
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Prefetch Cargo crates with retries
        run: |
          for i in 1 2 3 4 5; do
            cargo fetch --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }} && break
            echo "cargo fetch failed (attempt $i), retrying in 15s..."
            sleep 15
          done

      - name: Build and upload DMG
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ github.event.release.tag_name }}
          args: '--bundles dmg --target ${{ matrix.target }}'
          retryAttempts: 3
