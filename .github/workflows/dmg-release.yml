name: Release (macOS DMG)

on:
  push:
    branches:
      - main

concurrency:
  group: tunnel-manager-release
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build + publish GitHub Release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v-__VERSION__
          releaseName: Tunnel Manager v__VERSION__
          releaseBody: Automated DMG build from GitHub Actions.
          releaseDraft: false
          prerelease: false
          args: '--bundles dmg --target ${{ matrix.target }}'

