name: Release (Linux AppImage)

on:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build + publish GitHub Release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: tunnel-manager-linux-appimage-v__VERSION__-${{ github.sha }}
          releaseName: Tunnel Manager Linux AppImage v__VERSION__ (${{ github.sha }})
          releaseBody: Automated AppImage build from GitHub Actions.
          releaseDraft: false
          prerelease: false
          args: '--bundles appimage'

