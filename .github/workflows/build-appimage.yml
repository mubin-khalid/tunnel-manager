name: Build Linux AppImage

on:
  release:
    types: [created]

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Build and upload AppImage
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          args: '--bundles appimage'
```

---

**What to delete:** remove `.github/workflows/dmg-release.yml` and `.github/workflows/appimage-release.yml` — they're fully replaced by the 3 new files above.

---

**How the flow works now:**
```
push to main
    → release.yml runs
        → reads version from package.json
        → extracts that version's section from CHANGELOG.md
        → creates a DRAFT release with the changelog as the release body
            → triggers build-dmg.yml   (2 matrix jobs, arm64 + x64)
            → triggers build-appimage.yml
                → both upload their artifacts to the same draft release